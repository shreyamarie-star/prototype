<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Palette matched to aposlive.com — white page, ink, single purple accent */
    --bg:           #FFFFFF;        /* page bg — clean white like the live site */
    --bg-deep:      #F4F2EE;        /* legacy alias, unused */
    --surface:      #F6F1FB;        /* faint purple tint for cards */
    --surface-2:    #EFE6FA;        /* deeper purple tint for hover */
    --ink:          #0E0E0E;
    --ink-soft:     #2E2E2E;
    --ink-mute:     #6B6B6B;
    --ink-faint:    #A0A0A0;
    --rule:         rgba(14,14,14,0.10);
    --rule-soft:    rgba(14,14,14,0.06);
    --rule-purple:  rgba(95,13,184,0.18);         /* purple for card borders */

    /* APOS brand — purple accent matched to aposlive.com */
    --accent:       #5F0DB8;
    --accent-soft:  rgba(95,13,184,0.08);
    --accent-hi:    #7B2DD6;
    --accent-tint:  rgba(95,13,184,0.04);

    /* Type colors — all session tags share the brand purple.
       Networking stays sage so breaks/receptions read as utility rows. */
    --c-keynote:    oklch(0.45 0.15 285);   /* deep violet */
    --c-keynote-bg: oklch(0.96 0.025 285);
    --c-presentation:    oklch(0.45 0.15 285);
    --c-presentation-bg: oklch(0.96 0.025 285);
    --c-panel:      oklch(0.45 0.15 285);
    --c-panel-bg:   oklch(0.96 0.025 285);
    --c-fireside:   oklch(0.45 0.15 285);
    --c-fireside-bg:oklch(0.96 0.025 285);
    /* Brand red — derived from #e7191f, used for networking/break tags.
       Muted so it reads as warm utility, not danger. */
    --c-networking: oklch(0.50 0.11 28);     /* warm muted brick */
    --c-networking-bg: oklch(0.96 0.02 28);  /* faint warm tint */
    --c-ceo:        oklch(0.45 0.15 285);
    --c-ceo-bg:     oklch(0.96 0.025 285);

    --r-sm: 4px;
    --r-md: 8px;
    --r-lg: 14px;
    --r-pill: 999px;

    --gap: clamp(28px, 5vw, 72px);
  }

  html { background: var(--bg); }
  body {
    background: var(--bg);
    color: var(--ink);
    position: relative;
  }

  /* ─── AMBIENT TEXTURE ──────────────────────────────── */
  /* Dotted grid + soft edge wash to fill the wide-screen gutters
     without distracting from the centered content column.        */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      radial-gradient(circle, rgba(95,13,184,0.13) 1px, transparent 1.4px);
    background-size: 22px 22px;
    background-position: 0 0;
    /* Mask the dots OUT of the centered content column so they only
       appear in the side gutters. Page is 1100px; fade in dots from
       ~480px-from-center outward.                                    */
    -webkit-mask-image: linear-gradient(
      to right,
      rgba(0,0,0,0.9) 0,
      rgba(0,0,0,0.9) calc(50% - 530px),
      rgba(0,0,0,0)   calc(50% - 410px),
      rgba(0,0,0,0)   calc(50% + 410px),
      rgba(0,0,0,0.9) calc(50% + 530px),
      rgba(0,0,0,0.9) 100%
    );
            mask-image: linear-gradient(
      to right,
      rgba(0,0,0,0.9) 0,
      rgba(0,0,0,0.9) calc(50% - 530px),
      rgba(0,0,0,0)   calc(50% - 410px),
      rgba(0,0,0,0)   calc(50% + 410px),
      rgba(0,0,0,0.9) calc(50% + 530px),
      rgba(0,0,0,0.9) 100%
    );
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      linear-gradient(to right,
        rgba(95,13,184,0.05) 0%,
        rgba(95,13,184,0.02) 8%,
        rgba(255,255,255,0)  18%,
        rgba(255,255,255,0)  82%,
        rgba(95,13,184,0.02) 92%,
        rgba(95,13,184,0.05) 100%);
  }
  /* Lift real content above the texture layers */
  .page { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 0 var(--gap); }

  /* Hide texture on small screens — gutters disappear so it'd just be noise */
  @media (max-width: 1100px) {
    body::before, body::after { display: none; }
  }
    font-family: 'Wix Madefor Display', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* (column geometry merged into the .page rule above) */

  /* ─── HERO ─────────────────────────────────────────── */
  .hero { padding: clamp(40px, 7vw, 88px) 0 clamp(28px, 4vw, 48px); position: relative; }

  /* ─── COMPACT / EMBEDDED MODE ──────────────────────── */
  /* When the page sits under aposlive.com's purple AGENDA banner the
     internal headline is redundant — we drop the H1 and merge the meta
     row + stats into a single tight band so day-tabs appear immediately. */
  .page.is-compact .hero {
    padding: clamp(28px, 4vw, 48px) 0 clamp(20px, 2.5vw, 32px);
  }
  .page.is-compact .hero-eyebrow {
    margin-bottom: 0;
    font-size: 12px;
  }
  .page.is-compact .hero-meta {
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px 32px;
    margin-top: 24px;
    padding-top: 22px;
  }
  .page.is-compact .hero-meta .meta-block { padding: 0; }
  .page.is-compact .meta-block .meta-label { font-size: 11px; margin-bottom: 8px; }
  .page.is-compact .meta-block .meta-value {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: 1.55rem; font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }
  /* Stats: large, confident numbers that anchor the top band */
  .page.is-compact .hero-stats {
    margin-top: 22px;
    gap: 28px 40px;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
  }
  .page.is-compact .stat {
    padding: 0;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  .page.is-compact .stat-num {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: 2.6rem; font-weight: 700;
    line-height: 1; letter-spacing: -0.02em;
  }
  .page.is-compact .stat-label { font-size: 10px; }
  .page.is-compact .day-nav { margin-top: clamp(58px, 7vw, 70px); padding-top: 12px; }
  .page.is-compact .day-tab { padding: 18px 22px 20px; min-width: 160px; }
  .page.is-compact .day-tab-date { font-size: 1.5rem; }

  @media (max-width: 720px) {
    .page.is-compact .hero { padding: 22px 0 18px; }
    .page.is-compact .hero-meta { grid-template-columns: 1fr 1fr; gap: 18px 22px; margin-top: 18px; padding-top: 16px; }
    .page.is-compact .meta-block .meta-value { font-size: 1.15rem; }
    .page.is-compact .hero-stats { margin-top: 18px; gap: 18px 24px; }
    .page.is-compact .stat-num { font-size: 1.9rem; }
  }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute); margin-bottom: 22px;
  }
  .hero-eyebrow::before {
    content: ''; width: 18px; height: 1px; background: var(--ink-mute);
  }

  .hero h1 {
    font-family: 'Aileron', system-ui, sans-serif;
    font-weight: 800;
    font-size: clamp(3.2rem, 9vw, 7rem);
    line-height: 0.95;
    letter-spacing: -0.025em;
    color: var(--ink);
  }
  .hero h1 em {
    font-style: italic; font-weight: 300;
    color: var(--ink-mute);
  }

  .hero-meta {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px;
    margin-top: clamp(28px, 4vw, 48px);
    padding-top: 24px;
    border-top: 1px solid var(--rule);
  }
  .meta-block .meta-label {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 6px;
  }
  .meta-block .meta-value {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: 1.05rem; font-weight: 600;
    color: var(--ink); line-height: 1.3;
  }

  .hero-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 24px;
    margin-top: 24px;
  }
  .stat {
    display: flex; flex-direction: column; gap: 2px;
    padding: 16px 0;
  }
  .stat-num {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: 2.4rem; font-weight: 700;
    line-height: 1; letter-spacing: -0.02em;
    color: var(--ink);
  }
  .stat-label {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-mute);
  }

  /* ─── DAY NAV ──────────────────────────────────────── */
  /* Scroll hint — sticky chevron pill that signals more sessions below.
     Sticky (rather than fixed) so it works correctly when the page is
     embedded in an iframe — fixed positioning anchors to the iframe's
     own viewport which can render off-screen on host-scrolled pages.
     The anchor sits ABOVE the long session list so the sticky element
     pins to the viewport bottom while the list scrolls past. */
  .scroll-sentinel { width: 1px; height: 1px; }
  .scroll-hint-anchor {
    position: sticky;
    bottom: 24px;
    height: 0;
    z-index: 50;
    pointer-events: none;
    text-align: center;
    /* Pull the pill up so it visually sits at bottom: 24px without
       contributing layout height to its row. */
    transform: translateY(-44px);
  }
  .scroll-hint {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px 9px 16px;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    box-shadow: 0 12px 30px -10px rgba(95,13,184,0.55), 0 2px 6px rgba(0,0,0,0.08);
    opacity: 0; pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(.2,.7,.2,1);
  }
  .scroll-hint.visible {
    opacity: 1;
    transform: translateY(0);
    animation: scroll-hint-bob 1.8s ease-in-out infinite;
  }
  .scroll-hint-chev { animation: scroll-hint-chev 1.4s ease-in-out infinite; }
  @keyframes scroll-hint-bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }
  @keyframes scroll-hint-chev {
    0%, 100% { transform: translateY(0); opacity: 0.85; }
    50%      { transform: translateY(2px); opacity: 1; }
  }

  .day-nav {
    display: flex; gap: 12px;
    margin-top: clamp(36px, 5vw, 60px);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    /* Generous top padding so hover-lift transform isn't clipped */
    padding: 8px 2px 6px;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  /* Distinct, clearly clickable cards — not a ribbon */
  .day-tab {
    flex: 1 1 0; min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--rule-purple);
    border-radius: var(--r-md);
    padding: 18px 22px;
    cursor: pointer; text-align: left;
    color: var(--ink);
    position: relative;
    transition: transform 0.22s cubic-bezier(.2,.7,.2,1),
                border-color 0.2s ease,
                background 0.2s ease;
  }
  .day-tab:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
  }
  .day-tab:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .day-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .day-tab.active .day-tab-date,
  .day-tab.active .day-tab-label,
  .day-tab.active .day-tab-weekday,
  .day-tab.active .day-tab-count { color: #fff; }

  .day-tab-row { display: flex; align-items: baseline; gap: 12px; }
  .day-tab-label {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .day-tab-weekday {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-faint);
  }
  .day-tab-date {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: 1.7rem; font-weight: 700;
    line-height: 1.1; letter-spacing: -0.015em;
    margin-top: 6px;
    color: inherit;
  }
  .day-tab-count {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 8px;
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--ink-faint);
  }

  /* ─── TIME FILTER ──────────────────────────────────── */
  .time-nav {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }
  .time-tab {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: transparent; border: 1px solid var(--rule);
    border-radius: var(--r-pill);
    font-family: 'Wix Madefor Display', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-mute);
    cursor: pointer;
    transition: all 0.22s ease;
  }
  .time-tab:hover { border-color: var(--accent); color: var(--accent); }
  .time-tab.active {
    background: var(--accent); color: #fff;
    border-color: var(--accent);
  }
  .time-tab .count {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; opacity: 0.6;
    padding-left: 4px; border-left: 1px solid currentColor;
    margin-left: 2px;
  }
  .time-tab.active .count { opacity: 0.7; }
  .time-tab[data-hidden="true"] { display: none; }

  /* ─── SESSION LIST ─────────────────────────────────── */
  .sessions { padding: 8px 0 118px; }

  .session-list { display: none; }
  .session-list.visible { display: block; animation: fadeUp 0.32s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .session {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: clamp(20px, 3vw, 40px);
    padding: clamp(20px, 2.6vw, 32px) 0;
    border-bottom: 1px solid var(--rule);
    position: relative;
  }
  .session::before {
    content: '';
    position: absolute; left: calc(var(--gap) * -1); right: calc(var(--gap) * -1);
    top: 0; bottom: 0;
    background: transparent;
    transition: background 0.2s ease;
    pointer-events: none;
  }
  .session:hover::before { background: rgba(26,26,26,0.02); }

  .session-time-col { padding-top: 6px; }
  .session-time {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 15px; font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1.4;
    display: block;
  }
  .session-time-marker {
    width: 24px; height: 1px;
    background: var(--ink); margin-top: 14px;
    transition: width 0.3s ease;
  }
  .session:hover .session-time-marker { width: 40px; }

  /* type tag — colored, animated on hover */
  .tags-row {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    margin-bottom: 10px;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 6px;
    height: 26px;
    padding: 0 12px;
    border-radius: var(--r-pill);
    font-family: 'Wix Madefor Display', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    border: 1px solid transparent;
    transition: transform 0.25s cubic-bezier(.2,.7,.2,1),
                box-shadow 0.25s ease,
                background 0.25s ease;
    will-change: transform;
  }
  .tag-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .session:hover .tag {
    transform: translateY(-1px);
  }

  .tag-keynote      { color: var(--c-keynote);      background: var(--c-keynote-bg); }
  .tag-presentation { color: var(--c-presentation); background: var(--c-presentation-bg); }
  .tag-panel        { color: var(--c-panel);        background: var(--c-panel-bg); }
  .tag-fireside     { color: var(--c-fireside);     background: var(--c-fireside-bg); }
  .tag-networking   { color: var(--c-networking);   background: var(--c-networking-bg); }
  .tag-ceo-forum    { color: var(--c-ceo);          background: var(--c-ceo-bg); }

  .session:hover .tag-keynote      { box-shadow: 0 2px 12px -4px var(--c-keynote); }
  .session:hover .tag-presentation { box-shadow: 0 2px 12px -4px var(--c-presentation); }
  .session:hover .tag-panel        { box-shadow: 0 2px 12px -4px var(--c-panel); }
  .session:hover .tag-fireside     { box-shadow: 0 2px 12px -4px var(--c-fireside); }
  .session:hover .tag-ceo-forum    { box-shadow: 0 2px 12px -4px var(--c-ceo); }

  /* sponsor lockup — inline with type tag (the headline feature) */
  .sponsor-row {
    margin-top: 14px;
    margin-bottom: 4px;
  }
  .sponsor-lockup {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 0;
    background: transparent;
    border: none;
    font-family: 'Wix Madefor Display', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink-mute);
  }
  .sponsor-lockup .sp-label {
    font-style: italic;
    color: var(--ink-mute);
  }
  .sponsor-lockup .sp-divider { display: none; }
  .sponsor-mark {
    display: inline-flex; align-items: center;
    height: 18px; line-height: 1;
  }
  .sponsor-mark img {
    height: 48px; width: auto; max-width: 200px;
    object-fit: contain;
    filter: none;
  }
  /* typographic fallback when no real logo file is available */
  .sponsor-mark.is-text {
    font-family: 'Aileron', system-ui, sans-serif;
    font-style: italic;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1;
  }

  .loc-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 11px; color: var(--ink-mute);
    letter-spacing: 0.04em;
  }
  .loc-tag svg { opacity: 0.6; }

  .session-title {
    font-family: 'Aileron', system-ui, sans-serif;
    font-size: clamp(1.4rem, 2.4vw, 1.85rem);
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.015em;
    color: var(--ink);
    margin-bottom: 10px;
    text-wrap: pretty;
  }

  /* Clickable session titles (e.g. AVIA roundtables that link out to
     avia.org). Inherits the title's typography; turns brand purple on
     hover/active so the affordance is obvious without underline noise. */
  .session-title-link {
    color: inherit;
    text-decoration: none;
    transition: color 0.18s ease;
  }
  .session-title-link:hover,
  .session-title-link:focus-visible,
  .session-title-link:active {
    color: var(--accent);
  }
  .session-title-link:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 2px;
  }

  .session.is-networking .session-title {
    font-family: 'Wix Madefor Display', sans-serif;
    font-size: 1rem; font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--ink-soft);
  }
  .session.is-networking {
    opacity: 0.85;
    align-items: center;
  }
  .session.is-networking .session-time-col { padding-top: 0; }
  .session.is-networking .session-time-marker { display: none; }
  .session.is-networking .session-title { margin-bottom: 0; }

  .session-note {
    font-family: 'Aileron', system-ui, sans-serif;
    font-style: italic; font-weight: 400;
    font-size: 0.95rem;
    color: var(--ink-mute);
    margin-bottom: 14px;
  }

  /* speakers */
  .speakers {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
    margin-top: 18px;
  }
  .speaker {
    display: flex; flex-direction: column;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--rule-purple);
    border-radius: var(--r-md);
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s ease, transform 0.25s cubic-bezier(.2,.7,.2,1), box-shadow 0.2s ease;
    min-width: 0;
  }
  a.speaker:hover {
    border-color: var(--accent);
    background: var(--surface-2);
    transform: translateY(-2px);
  }
  a.speaker:hover .speaker-name { color: var(--accent); }
  a.speaker:hover .speaker-company { color: var(--accent); }
  .speaker-name {
    font-family: 'Wix Madefor Display', system-ui, sans-serif;
    font-size: 0.95rem; font-weight: 700;
    color: var(--ink); line-height: 1.2;
  }
  .speaker-role-pair { display: contents; }
  .speaker-role {
    font-size: 11px; font-weight: 400;
    color: var(--ink-mute); margin-top: 4px;
    line-height: 1.35;
  }
  .speaker-company {
    font-size: 11px; font-weight: 600;
    color: var(--ink); margin-top: 2px;
    letter-spacing: 0.01em;
    white-space: normal; overflow: visible;
  }

  /* ─── FOOTER NOTE ─────────────────────────────────── */
  .agenda-foot {
    padding: 24px 0 60px;
    border-top: 1px solid var(--rule);
    display: flex; justify-content: space-between; flex-wrap: wrap;
    gap: 14px;
  }
  .foot-note {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-faint);
  }

  /* ─── EMPTY STATE ─────────────────────────────────── */
  .empty {
    padding: 60px 0;
    text-align: center;
    font-family: 'Aileron', system-ui, sans-serif;
    font-style: italic; font-size: 1.1rem;
    color: var(--ink-mute);
  }

  /* ─── RESPONSIVE ──────────────────────────────────── */
  /* tablet */
  @media (max-width: 960px) {
    .page { padding: 0 var(--gap); }
    .speakers { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .meta-row { gap: 36px; }
  }

  /* phone */
  @media (max-width: 720px) {
    .page { padding: 0 18px; }
    .hero { padding: 56px 0 36px; }
    .hero h1 { font-size: clamp(2.6rem, 13vw, 4.4rem); line-height: 0.96; }
    .hero-eyebrow { margin-bottom: 16px; font-size: 10px; }
    .meta-row {
      grid-template-columns: 1fr 1fr;
      gap: 22px 28px;
      margin-top: 28px; padding-top: 20px;
    }
    .stats-row { gap: 28px; margin-top: 28px; padding-top: 22px; }
    .stat-num { font-size: 1.9rem; }

    /* day tabs sit in a single row at phone widths — no horizontal
       scroll. Three compact cards, equal width. The `.page.is-compact`
       selector matches the wrapper class and beats the desktop overrides
       in source order so these rules actually take effect on phones. */
    .sticky-header {
      margin-left: 0;
      margin-right: 0;
      padding-left: 18px;
      padding-right: 18px;
    }
    .page .day-nav,
    .page.is-compact .day-nav {
      margin-top: 12px;
      gap: 6px;
      padding-bottom: 0;
      padding-top: 0;
      flex-wrap: nowrap;
      overflow-x: auto;
    }
    .page .day-nav::-webkit-scrollbar,
    .page.is-compact .day-nav::-webkit-scrollbar { display: none; }
    .page .day-tab,
    .page.is-compact .day-tab {
      flex: 1 1 0;
      min-width: 0;
      padding: 10px 8px 12px;
      border-radius: 10px;
    }
    /* stack: Day 0 / Tuesday / June 16 — each on its own line */
    .day-tab-row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }
    .day-tab-label { font-size: 9px; }
    .day-tab-weekday { font-size: 9px; }
    .page .day-tab-date,
    .page.is-compact .day-tab-date { font-size: 1rem; }

    .time-tabs { padding: 16px 0; gap: 6px; }
    .time-tab { padding: 7px 12px; font-size: 11px; }

    /* sessions: stack time + content, tighter overall */
    .session {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 16px 0;
    }
    .session-time-col { padding-top: 0; }
    .session-time-marker { display: none; }
    .session-time { font-size: 13px; }
    .session-title { font-size: 1.05rem; line-height: 1.25; }
    .session-note { font-size: 12px; margin-top: 6px; }
    .session-meta { gap: 10px; flex-wrap: wrap; }
    .tags-row { margin-bottom: 8px; }
    .tag { height: 22px; padding: 0 9px; font-size: 10px; }

    /* sponsor lockup wraps cleanly */
    .sponsor-row { margin-top: 10px; }
    .sponsor-lockup { padding: 5px 12px; gap: 9px; font-size: 10px; }
    .sponsor-mark.is-text { font-size: 14px; }
    .sponsor-mark img { height: 18px; max-width: 90px; }

    /* speakers: 2-up grid on phone, fills row efficiently */
    .speakers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      margin-top: 12px;
    }
    a.speaker, .speaker {
      padding: 9px 11px;
      width: auto;
      max-width: 100%;
    }
    .speaker-name {
      font-size: 0.85rem;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }
    .speaker-role, .speaker-company {
      font-size: 10px;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }

    .agenda-foot { padding: 22px 0 50px; }
    .search-input { font-size: 0.78rem; }
    .search-input::placeholder { font-size: 0.78rem; }
  }

  /* ─── STICKY HEADER (search + day nav) ───────────────── */
  .sticky-header {
    position: relative;
    z-index: 20;
    background: var(--bg);
    padding-bottom: 10px;
  }
  /* Replicates body::before dot pattern so the header blends with the page */
  .sticky-header::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image: radial-gradient(circle, rgba(95,13,184,0.13) 1px, transparent 1.4px);
    background-size: 22px 22px;
    -webkit-mask-image: linear-gradient(
      to right,
      rgba(0,0,0,0.9) 0,
      rgba(0,0,0,0.9) calc(50% - 530px),
      rgba(0,0,0,0)   calc(50% - 410px),
      rgba(0,0,0,0)   calc(50% + 410px),
      rgba(0,0,0,0.9) calc(50% + 530px),
      rgba(0,0,0,0.9) 100%
    );
    mask-image: linear-gradient(
      to right,
      rgba(0,0,0,0.9) 0,
      rgba(0,0,0,0.9) calc(50% - 530px),
      rgba(0,0,0,0)   calc(50% - 410px),
      rgba(0,0,0,0)   calc(50% + 410px),
      rgba(0,0,0,0.9) calc(50% + 530px),
      rgba(0,0,0,0.9) 100%
    );
  }

  /* ─── SEARCH BAR ─────────────────────────────────────── */
  .search-wrap {
    padding: clamp(16px, 3vw, 24px) 0 0;
  }
  .search-input-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--rule-purple);
    border-radius: var(--r-pill);
    padding: 10px 18px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .search-input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(95,13,184,0.08);
  }
  .search-icon { color: var(--ink-faint); flex-shrink: 0; }
  .search-input {
    flex: 1; border: none; background: transparent;
    font-family: 'Wix Madefor Display', sans-serif;
    font-size: 0.95rem; color: var(--ink);
    outline: none;
  }
  .search-input::placeholder {
    color: var(--ink-faint);
    font-family: 'Wix Madefor Display', sans-serif;
  }
  .search-clear {
    background: none; border: none; cursor: pointer;
    color: var(--ink-faint); padding: 0; line-height: 1;
    transition: color 0.15s ease;
  }
  .search-clear:hover { color: var(--ink); }
  .search-results-label {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-faint);
    padding: 16px 0 8px;
  }
  .search-day-label {
    font-family: 'Be Vietnam', system-ui, sans-serif;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent);
    padding: 18px 0 4px;
    border-top: 1px solid var(--rule-purple);
    margin-top: 4px;
  }
  .search-day-label:first-child { border-top: none; margin-top: 0; padding-top: 8px; }

  /* very small phones */
  @media (max-width: 380px) {
    .page { padding: 0 12px; }
    .meta-row { grid-template-columns: 1fr; }
    .day-tab { padding: 9px 6px 11px; }
    .day-tab-label, .day-tab-weekday { font-size: 8px; }
    .day-tab-date { font-size: 0.92rem; }
    .session-title { font-size: 1rem; }
    /* fall back to single column when there's truly no room */
    .speakers { grid-template-columns: 1fr; }
  }
</style>

<script type="text/babel">
/* global React, ReactDOM, AGENDA, AGENDA_DAYS, AGENDA_META, SPONSORS */
const { useState, useMemo, useEffect } = React;

const TYPE_LABELS = {
  'keynote': 'Keynote',
  'presentation': 'Presentation',
  'panel': 'Panel',
  'fireside': 'Fireside',
  'networking': 'Networking',
  'ceo-forum': 'CEO Forum'
};

function flattenDay(dayId) {
  const data = AGENDA[dayId] || {};
  if (Array.isArray(data.sessions)) return data.sessions;
  return [
    ...(data.morning || []),
    ...(data.afternoon || []),
    ...(data.evening || [])
  ];
}

const TWEAK_DEFAULTS = {
  "sponsorStyle": "lockup",
  "headerStyle": "editorial",
  "showStats": true,
  "showHeroImage": false,
  "density": "spacious",
  "embedMode": "compact"
};

function SponsorMark({ id }) {
  const sp = (window.SPONSORS || {})[id];
  if (!sp) return <span className="sponsor-mark is-text">{id}</span>;
  if (sp.src) {
    return (
      <span className="sponsor-mark">
        <img src={sp.src} alt={sp.name} />
      </span>
    );
  }
  return <span className="sponsor-mark is-text">{sp.name}</span>;
}

function SponsorLockup({ sponsor, style }) {
  if (!sponsor) return null;
  if (style === 'inline-text') {
    return (
      <span className="sponsor-lockup" style={{ background: 'transparent', border: 'none', padding: 0 }}>
        <span className="sp-label">{sponsor.label.toLowerCase()}</span>
        <SponsorMark id={sponsor.id} />
      </span>
    );
  }
  return (
    <span className="sponsor-lockup">
      <span className="sp-label">{sponsor.label.toLowerCase()}</span>
      <span className="sp-divider"></span>
      <SponsorMark id={sponsor.id} />
    </span>
  );
}

const PinIcon = () => (
  <svg width="11" height="13" viewBox="0 0 11 13" fill="none">
    <path d="M5.5 0.5C3.01 0.5 1 2.51 1 5c0 3.4 4.5 7.5 4.5 7.5S10 8.4 10 5c0-2.49-2.01-4.5-4.5-4.5z" stroke="currentColor" strokeWidth="1"/>
    <circle cx="5.5" cy="5" r="1.5" stroke="currentColor" strokeWidth="1"/>
  </svg>
);

function Speaker({ s }) {
  var spans = [<span key="n" className="speaker-name">{s.name}</span>];
  if (s.roles) {
    s.roles.forEach(function(r, i) {
      spans.push(<span key={'r'+i} className="speaker-role">{r.title}</span>);
      spans.push(<span key={'c'+i} className="speaker-company">{r.company}</span>);
    });
  } else {
    spans.push(<span key="role" className="speaker-role">{s.role}</span>);
    spans.push(<span key="co" className="speaker-company">{s.company}</span>);
  }
  if (s.url) {
    return <a className="speaker" href={s.url} target="_blank" rel="noopener">{spans}</a>;
  }
  return <div className="speaker">{spans}</div>;
}

function SessionRow({ s, sponsorStyle }) {
  const isNetworking = s.type === 'networking';
  return (
    <div className={`session${isNetworking ? ' is-networking' : ''}`}>
      <div className="session-time-col">
        <span className="session-time">{s.time}</span>
        <div className="session-time-marker"></div>
      </div>
      <div className="session-body">
        {s.location && (
          <div className="tags-row">
            <span className="loc-tag">
              <PinIcon />
              {s.location}
            </span>
          </div>
        )}
        <div className="session-title">
          {s.titleUrl ? (
            <a className="session-title-link" href={s.titleUrl} target="_blank" rel="noopener">
              {s.title}
            </a>
          ) : s.title}
        </div>
        {!isNetworking && <div className="session-note">{s.note || TYPE_LABELS[s.type]}</div>}
        {s.sponsor && <div className="sponsor-row"><SponsorLockup sponsor={s.sponsor} style={sponsorStyle} /></div>}
        {s.speakers && s.speakers.length > 0 && (
          <div className="speakers">
            {s.speakers.map((sp, i) => <Speaker key={i} s={sp} />)}
          </div>
        )}
      </div>
    </div>
  );
}

function Hero({ tweaks, totalSessions, totalSpeakers }) {
  const isCompact = tweaks.embedMode === 'compact';
  if (isCompact) return null;
  return (
    <div className="hero">
      <div className="hero-eyebrow">{AGENDA_META.eyebrow} · {AGENDA_META.status}</div>
      <h1>The <em>Agenda</em></h1>
      <div className="hero-meta">
        <div className="meta-block">
          <div className="meta-label">Dates</div>
          <div className="meta-value">{AGENDA_META.dates}</div>
        </div>
        <div className="meta-block">
          <div className="meta-label">Venue</div>
          <div className="meta-value">{AGENDA_META.venue}</div>
        </div>
        <div className="meta-block">
          <div className="meta-label">Convened by</div>
          <div className="meta-value">{AGENDA_META.organizer}</div>
        </div>
      </div>
      {tweaks.showStats && (
        <div className="hero-stats">
          <div className="stat">
            <div className="stat-num">{AGENDA_DAYS.length}</div>
            <div className="stat-label">Days</div>
          </div>
          <div className="stat">
            <div className="stat-num">{totalSessions}</div>
            <div className="stat-label">Sessions</div>
          </div>
          <div className="stat">
            <div className="stat-num">{totalSpeakers}+</div>
            <div className="stat-label">Speakers</div>
          </div>
        </div>
      )}
    </div>
  );
}

function sessionMatchesQuery(s, q) {
  const hay = [
    s.title || '',
    s.note || '',
    ...(s.speakers || []).map(sp => `${sp.name} ${sp.role} ${sp.company}`)
  ].join(' ').toLowerCase();
  return hay.includes(q);
}

function SearchBar({ query, onChange }) {
  return (
    <div className="search-wrap">
      <div className="search-input-row">
        <svg className="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="currentColor" strokeWidth="2"/>
          <path d="M16.5 16.5L21 21" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
        </svg>
        <input
          className="search-input"
          type="text"
          placeholder="Search sessions, speakers, companies…"
          value={query}
          onChange={e => onChange(e.target.value)}
        />
        {query && (
          <button className="search-clear" onClick={() => onChange('')} aria-label="Clear search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
            </svg>
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const tweaks = TWEAK_DEFAULTS;
  const [activeDay, setActiveDay] = useState(AGENDA_DAYS[0].id);
  const [query, setQuery] = useState('');

  const q = query.trim().toLowerCase();

  const sessionsToShow = useMemo(() => flattenDay(activeDay), [activeDay]);

  const searchResults = useMemo(() => {
    if (!q) return null;
    return AGENDA_DAYS.map(d => ({
      day: d,
      sessions: flattenDay(d.id).filter(s => sessionMatchesQuery(s, q))
    })).filter(g => g.sessions.length > 0);
  }, [q]);

  const totalSessions = useMemo(() => {
    let n = 0;
    for (const d of AGENDA_DAYS) {
      n += flattenDay(d.id).filter(s => s.type !== 'networking').length;
    }
    return n;
  }, []);

  const totalSpeakers = useMemo(() => {
    const seen = new Set();
    for (const d of AGENDA_DAYS) {
      for (const s of flattenDay(d.id)) {
        (s.speakers || []).forEach(sp => seen.add(sp.name));
      }
    }
    return seen.size;
  }, []);

  return (
    <div className={"page" + (tweaks.embedMode === 'compact' ? ' is-compact' : '')}>
      <Hero tweaks={tweaks} totalSessions={totalSessions} totalSpeakers={totalSpeakers} />

      <div className="sticky-header">
        <SearchBar query={query} onChange={setQuery} />
        {!q && (
          <div className="day-nav">
            {AGENDA_DAYS.map(d => (
              <button
                key={d.id}
                className={`day-tab${activeDay === d.id ? ' active' : ''}`}
                onClick={() => setActiveDay(d.id)}
              >
                <div className="day-tab-row">
                  <span className="day-tab-label">{d.label}</span>
                  <span className="day-tab-weekday">{d.weekday}</span>
                </div>
                <div className="day-tab-date">{d.date}</div>
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="sessions">
        {q ? (
          searchResults && searchResults.length > 0 ? (
            <div className="session-list visible">
              {searchResults.map(({ day, sessions }) => (
                <div key={day.id}>
                  <div className="search-day-label">{day.label} · {day.weekday} {day.date}</div>
                  {sessions.map((s, i) => (
                    <SessionRow key={i} s={s} sponsorStyle={tweaks.sponsorStyle} />
                  ))}
                </div>
              ))}
            </div>
          ) : (
            <div className="empty">No results for "{query}"</div>
          )
        ) : (
          <div className="session-list visible" key={activeDay}>
            {sessionsToShow.length === 0 && <div className="empty">No sessions for this day.</div>}
            {sessionsToShow.map((s, i) => (
              <SessionRow key={i} s={s} sponsorStyle={tweaks.sponsorStyle} />
            ))}
          </div>
        )}
      </div>

      <div className="agenda-foot"></div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// iFrameResizer — tells the parent page to grow/shrink to fit content
// so there is no internal iframe scroll.
</script>

</body>
</html>
